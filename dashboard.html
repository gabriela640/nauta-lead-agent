<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nauta Lead Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a2e; }
  header { background: #1E3A5F; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 13px; opacity: 0.7; }
  .tabs { display: flex; gap: 0; background: white; border-bottom: 1px solid #e5e7eb; padding: 0 24px; }
  .tab { padding: 14px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: #6b7280; font-weight: 500; }
  .tab.active { color: #1E3A5F; border-bottom-color: #1E3A5F; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: white; border-radius: 8px; padding: 16px; border: 1px solid #e5e7eb; }
  .stat-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-value.pending { color: #f59e0b; }
  .stat-value.emailed { color: #3b82f6; }
  .stat-value.replied { color: #10b981; }
  .stat-value.total { color: #1E3A5F; }
  .leads-grid { display: flex; flex-direction: column; gap: 12px; }
  .lead-card { background: white; border-radius: 8px; border: 1px solid #e5e7eb; padding: 20px; }
  .lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .lead-name { font-size: 16px; font-weight: 600; }
  .lead-title { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
  .badge.high { background: #fef3c7; color: #92400e; }
  .badge.potential { background: #dbeafe; color: #1d4ed8; }
  .badge.not { background: #fee2e2; color: #991b1b; }
  .badge.pending { background: #fef3c7; color: #92400e; }
  .badge.emailed { background: #dbeafe; color: #1d4ed8; }
  .badge.replied { background: #d1fae5; color: #065f46; }
  .badge.rejected { background: #f3f4f6; color: #6b7280; }
  .lead-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
  .meta-item { font-size: 13px; color: #374151; }
  .meta-item span { color: #9ca3af; margin-right: 4px; }
  .reasons { font-size: 13px; color: #6b7280; margin-bottom: 14px; }
  .reasons ul { padding-left: 16px; margin-top: 4px; }
  .reasons li { margin-bottom: 2px; }
  .email-preview { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px; font-size: 13px; margin-bottom: 14px; }
  .email-subject { font-weight: 600; margin-bottom: 6px; color: #1a1a2e; }
  .email-body { white-space: pre-wrap; color: #374151; line-height: 1.5; max-height: 120px; overflow: hidden; }
  .email-body.expanded { max-height: none; }
  .expand-btn { color: #3b82f6; font-size: 12px; cursor: pointer; margin-top: 4px; display: inline-block; }
  .actions { display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
  .btn-approve { background: #1E3A5F; color: white; }
  .btn-approve:hover { background: #16304f; }
  .btn-reject { background: white; color: #6b7280; border: 1px solid #d1d5db; }
  .btn-reject:hover { background: #f9fafb; }
  .btn-replied { background: #10b981; color: white; }
  .btn-replied:hover { background: #059669; }
  .empty { text-align: center; padding: 60px 0; color: #9ca3af; font-size: 15px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: #9ca3af; }
  .section-title { font-size: 14px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1E3A5F; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Nauta Lead Dashboard</h1>
  <span id="last-updated"></span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('queue')">Review Queue</div>
  <div class="tab" onclick="switchTab('all')">All Leads</div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Leads</div><div class="stat-value total" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-label">Pending Review</div><div class="stat-value pending" id="stat-pending">—</div></div>
    <div class="stat"><div class="stat-label">Emailed</div><div class="stat-value emailed" id="stat-emailed">—</div></div>
    <div class="stat"><div class="stat-label">Replied</div><div class="stat-value replied" id="stat-replied">—</div></div>
  </div>

  <div id="leads-container"><div class="loading">Loading leads...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://web-production-131d.up.railway.app';
let currentTab = 'queue';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'queue') || (i === 1 && tab === 'all')));
  loadLeads();
}

async function loadStats() {
  const r = await fetch(`${API}/health`);
  const data = await r.json();
  const s = data.db.by_status || {};
  document.getElementById('stat-total').textContent = data.db.total || 0;
  document.getElementById('stat-pending').textContent = s.pending_review || 0;
  document.getElementById('stat-emailed').textContent = (s.emailed || 0) + (s.follow_up_1_sent || 0) + (s.follow_up_2_sent || 0) + (s.follow_up_3_sent || 0);
  document.getElementById('stat-replied').textContent = s.replied || 0;
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

async function loadLeads() {
  const container = document.getElementById('leads-container');
  container.innerHTML = '<div class="loading">Loading...</div>';
  const url = currentTab === 'queue' ? `${API}/queue?limit=100` : `${API}/leads?limit=100`;
  const r = await fetch(url);
  const data = await r.json();
  renderLeads(data.leads, container);
}

function renderLeads(leads, container) {
  if (!leads.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">✅</div>${currentTab === 'queue' ? 'No leads pending review' : 'No leads yet'}</div>`;
    return;
  }
  container.innerHTML = `<div class="section-title">${leads.length} lead${leads.length !== 1 ? 's' : ''}</div><div class="leads-grid">${leads.map(renderCard).join('')}</div>`;
}

function renderCard(l) {
  const cls = l.classification === 'High ICP' ? 'high' : l.classification === 'Potential ICP' ? 'potential' : 'not';
  const statusCls = l.status.replace('_', '-').replace('pending-review', 'pending');
  const reasons = JSON.parse(l.reasons_json || '[]');
  const bodyId = 'body-' + l.id;
  return `
  <div class="lead-card" id="card-${l.id}">
    <div class="lead-header">
      <div>
        <div class="lead-name">${l.first_name || ''} ${l.last_name || ''}</div>
        <div class="lead-title">${l.job_title || '—'} @ ${l.company_name || '—'}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="badge ${cls}">${l.classification}</span>
        <span class="badge ${l.status.includes('pending') ? 'pending' : l.status.includes('emailed') || l.status.includes('follow') ? 'emailed' : l.status}">${l.status.replace(/_/g,' ')}</span>
      </div>
    </div>
    <div class="lead-meta">
      <div class="meta-item"><span>🏢</span>${l.company_industry || '—'}</div>
      <div class="meta-item"><span>👥</span>${l.company_employee_count ? l.company_employee_count.toLocaleString() + ' employees' : '—'}</div>
      <div class="meta-item"><span>📍</span>${l.company_location || '—'}</div>
      <div class="meta-item"><span>🌐</span>${l.page_visited || '—'}</div>
      ${l.email ? `<div class="meta-item"><span>✉️</span>${l.email}</div>` : ''}
    </div>
    ${reasons.length ? `<div class="reasons"><strong>Reasons:</strong><ul>${reasons.map(r => `<li>${r}</li>`).join('')}</ul></div>` : ''}
    ${l.initial_email_subject ? `
    <div class="email-preview">
      <div class="email-subject">Subject: ${l.initial_email_subject}</div>
      <div class="email-body" id="${bodyId}">${l.initial_email_body || ''}</div>
      <span class="expand-btn" onclick="toggleBody('${bodyId}', this)">Show full email ▾</span>
    </div>` : ''}
    <div class="actions" id="actions-${l.id}">
      ${l.status === 'pending_review' ? `
        <button class="btn btn-approve" onclick="approve(${l.id})">✓ Approve & Send Email</button>
        <button class="btn btn-reject" onclick="reject(${l.id})">✗ Reject</button>
      ` : ''}
      ${(l.status === 'emailed' || l.status.includes('follow')) ? `
        <button class="btn btn-replied" onclick="markReplied(${l.id})">↩ Mark as Replied</button>
      ` : ''}
    </div>
  </div>`;
}

function toggleBody(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Hide ▴' : 'Show full email ▾';
}

async function approve(id) {
  const r = await fetch(`${API}/leads/${id}/approve`, { method: 'POST' });
  const data = await r.json();
  if (data.status === 'emailed') {
    showToast('Email sent! ✓');
    document.getElementById(`actions-${id}`).innerHTML = '<span style="color:#10b981;font-size:13px">✓ Email sent</span>';
    loadStats();
  } else {
    showToast('Error sending email', true);
  }
}

async function reject(id) {
  await fetch(`${API}/leads/${id}/reject`, { method: 'POST' });
  showToast('Lead rejected');
  document.getElementById(`card-${id}`).style.opacity = '0.4';
  document.getElementById(`actions-${id}`).innerHTML = '<span style="color:#9ca3af;font-size:13px">Rejected</span>';
  loadStats();
}

async function markReplied(id) {
  await fetch(`${API}/leads/${id}/mark_replied`, { method: 'POST' });
  showToast('Marked as replied ✓');
  document.getElementById(`actions-${id}`).innerHTML = '<span style="color:#10b981;font-size:13px">✓ Replied</span>';
  loadStats();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
loadStats();
loadLeads();
setInterval(() => { loadStats(); loadLeads(); }, 30000);
</script>
</body>
</html>
